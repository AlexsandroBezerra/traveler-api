version: '3.6'

networks:
  traveler-network:
    driver: bridge

services:
  traveler-api:
    build: .
    container_name: traveler-api
    command: yarn dev
    depends_on:
      - traveler-postgres
    environment:
      - POSTGRES_HOST=traveler-postgres
    volumes:
      - .:/home/node/api
    ports:
      - "3333:3333"
    networks:
      - traveler-network
    links:
      - traveler-postgres

  traveler-postgres:
    image: bitnami/postgresql:latest
    container_name: traveler-postgres
    environment:
      - POSTGRESQL_USERNAME=${POSTGRES_USER}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRES_DB_NAME}
    restart: always
    ports:
      - "5432:5432"
    networks:
      - traveler-network
